<!DOCTYPE html>
<html lang="en">
<head>

    .container{
        height: 750px;

        background-color: black;
        display: flex;
        justify-content: center;
    }
    .box{
        height: 450px;
        width: 650px;
        padding: 100px;
        display: grid;
        grid-template-columns: repeat(3,1fr);
        grid-template-rows: repeat(3,1fr);
        gap: 10px;
    }
    .child1{
        grid-column: 1/2;
        grid-row: 1/2;
        background-color: rgba(194, 11, 230, 0.443);
        border-radius: 15px;
        gap:10px;
        overflow: hidden;
    }
    .child1 img{
        height: 100%;
        width: 100%;
        object-fit: cover;
    }
    .child2{
        grid-column: 2/3;
        grid-row: 1/2;
        background-color: rgb(186, 20, 219);
        border-radius: 15px;
        gap:10px;
        font-size: 50px;
        display: flex;
        justify-content: center;
        align-items: center;
        color: aliceblue;
    }
    .child3{
        grid-column: 3/4;
        grid-row: 1/2;
        background-color: rgb(186, 20, 219);

        display: flex;
        justify-content: center;
        align-items: center;
        color: aliceblue;

    .child4{

        justify-content: center;
        align-items: center;
        color: aliceblue;
    }
    .child6{
        grid-column: 3/4;
        grid-row: 2/4;
        background-color: white;
        border-radius: 15px;

        font-size: 50px;
        display: flex;
        justify-content: center;
